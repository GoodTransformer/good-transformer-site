name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build
        env:
          NEXT_PUBLIC_FORMSPREE_PERSONAL_ENDPOINT: ${{ secrets.NEXT_PUBLIC_FORMSPREE_PERSONAL_ENDPOINT }}
          NEXT_PUBLIC_FORMSPREE_BOOKING_ENDPOINT: ${{ secrets.NEXT_PUBLIC_FORMSPREE_BOOKING_ENDPOINT }}
          NEXT_PUBLIC_CLARITY_CALL_URL: ${{ secrets.NEXT_PUBLIC_CLARITY_CALL_URL }}
          NEXT_PUBLIC_PERSONAL_LESSON_URL: ${{ secrets.NEXT_PUBLIC_PERSONAL_LESSON_URL }}
          NEXT_PUBLIC_BOOKING_BRIEF_EMAIL: ${{ secrets.NEXT_PUBLIC_BOOKING_BRIEF_EMAIL }}
          NEXT_PUBLIC_GA_MEASUREMENT_ID: ${{ secrets.NEXT_PUBLIC_GA_MEASUREMENT_ID }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
