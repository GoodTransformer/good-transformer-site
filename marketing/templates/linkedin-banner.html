<!doctype html>
<html lang="en-GB">
<head>
<meta charset="utf-8">
<title>LinkedIn company cover - Good Transformer</title>
<link rel="stylesheet" href="../brand.css">
<style>
  /* LinkedIn Company Page cover: 6:1, rendered 2100×350 @2× → 4200×700.
     DARK ground on purpose - cream blended into LinkedIn's white UI; a deep
     teal field makes the cover pop. Matches the dark "featured" tile system.
     No edge bars. Single centred headline = the one focal point, kept inside
     the centre-60% mobile safe zone. */
  :root { --teal-bright: #2BBCC4; }

  html, body { width: 2100px; height: 350px; }
  .stage {
    position: relative;
    width: 2100px;
    height: 350px;
    background: linear-gradient(115deg, #0B3D45 0%, #062A31 52%, #04171C 100%);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    color: var(--paper);
  }
  /* Soft brand glow for depth - never a flat slab, never an edge line.
     Kept to the corners so the centre stays dark and the headline pops. */
  .stage::after {
    content: ""; position: absolute; inset: 0; z-index: 0; pointer-events: none;
    background:
      radial-gradient(circle at 90% 10%, rgba(0,166,178,0.30), transparent 46%),
      radial-gradient(circle at 8% 94%,  rgba(0,166,178,0.13), transparent 42%);
  }
  .stage > * { position: relative; z-index: 1; }

  .headline {
    font-family: var(--font-serif); font-weight: 400; font-size: 76px;
    line-height: 1.0; letter-spacing: -0.018em; color: var(--paper); margin: 0;
    white-space: nowrap;
  }
  .headline .accent { color: var(--teal-bright); font-style: italic; }
  .sub {
    font-family: var(--font-sans); font-weight: 400; font-size: 23px;
    letter-spacing: 0.01em; color: rgba(251,248,244,0.95); margin: 20px 0 0;
  }

  /* Soft anchor / CTA, well inside the safe zone, clear of the bottom-left logo. */
  .site {
    position: absolute; left: 0; right: 0; bottom: 30px; z-index: 1;
    text-align: center;
    font-family: var(--font-sans); font-weight: 700; font-size: 19px;
    letter-spacing: 0.03em; color: var(--teal-bright);
  }
</style>
</head>
<body>
  <div class="stage">
    <h1 class="headline">Practical AI lessons <span class="accent">for leaders</span></h1>
    <p class="sub">Calm, practical 1-to-1 coaching. No hype.</p>
    <span class="site">goodtransformer.ai</span>
  </div>
</body>
</html>
