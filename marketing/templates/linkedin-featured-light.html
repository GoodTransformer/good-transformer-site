<!doctype html>
<html lang="en-GB">
<head>
<meta charset="utf-8">
<title>LinkedIn featured tile (light) - Good Transformer</title>
<link rel="stylesheet" href="../brand.css">
<style>
  html, body { width: 1080px; height: 1080px; }
  .stage {
    position: relative;
    width: 1080px;
    height: 1080px;
    background: var(--paper);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 86px 88px 80px;
    color: var(--ink);
    /* Hairline so the tile still defines its edge on LinkedIn's white. */
    box-shadow: inset 0 0 0 1px rgba(4,31,37,0.10);
  }
  .edge-t { position:absolute; top:0; left:0; right:0; height:8px; background:var(--teal); z-index:2; }
  .stage > * { position: relative; z-index: 1; }

  .top { display: flex; align-items: center; gap: 14px; }
  .top img { height: 34px; width: auto; }
  .top .wm {
    font-family: var(--font-sans); font-weight: 700; font-size: 18px;
    letter-spacing: 0.26em; text-transform: uppercase; color: var(--ink);
  }

  .mid { margin-top: -40px; }
  .mid .eyebrow { color: var(--moss); font-size: 17px; letter-spacing: 0.28em; }
  .mid .headline {
    font-family: var(--font-serif); font-weight: 400; font-size: 82px;
    line-height: 1.0; letter-spacing: -0.02em; color: var(--ink); margin: 22px 0 0;
  }
  .mid .headline .accent { color: var(--teal); font-style: italic; }
  .hair { height: 2px; background: rgba(0,140,149,0.5); margin: 40px 0 30px; width: 240px; }

  .leave { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 16px; }
  .leave li {
    position: relative; padding-left: 30px;
    font-family: var(--font-sans); font-size: 25px; line-height: 1.3; color: #2c3a3e;
  }
  .leave li::before {
    content: ""; position: absolute; left: 0; top: 11px;
    width: 11px; height: 11px; border: 2px solid var(--teal); border-radius: 50%;
  }

  .foot { display: flex; align-items: baseline; justify-content: space-between; }
  .foot .site { font-family: var(--font-sans); font-weight: 700; font-size: 30px; letter-spacing: 0.01em; color: var(--teal); }
  .foot .who  { font-family: var(--font-sans); font-size: 19px; color: var(--slate); }
</style>
</head>
<body>
  <div class="stage">
    <span class="edge-t"></span>

    <div class="top">
      <img class="mark--ink" src="../../public/logos/gt-logo.png" alt="">
      <span class="wm">Good Transformer</span>
    </div>

    <div class="mid">
      <p class="eyebrow">For leaders &middot; 1-to-1 coaching</p>
      <h1 class="headline">Practical AI<br>lessons <span class="accent">for leaders</span></h1>
      <div class="hair"></div>
      <ul class="leave">
        <li>Skills that fit your real work</li>
        <li>A clear view of AI in your business</li>
        <li>Calm and practical - no hype</li>
      </ul>
    </div>

    <div class="foot">
      <span class="site">goodtransformer.ai</span>
      <span class="who">Patrick Hussey &middot; AI coach &amp; adviser</span>
    </div>
  </div>
</body>
</html>
